name: Update Dependencies
on:
  workflow_dispatch:
  schedule:
    - cron: 0 21 * * 5

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    if: ${{ github.repository == 'alextheman231/infrastructure' }}
    uses: alextheman231/github-actions/.github/workflows/update-dependencies.yml@2b88b428425b25d437ecf743fc320528a9a25f4a # v12.5.0
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
      TFE_TOKEN: ${{ secrets.TFE_TOKEN }}
    with:
      update_pnpm: true
      update_javascript_dependencies: true
      update_actions: true
      update_terraform: true
      tf_workspace: ${{ vars.TF_WORKSPACE }}
      tf_cloud_organization: ${{ vars.TF_CLOUD_ORGANIZATION }}
