name: Terraform CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

jobs:
  terraform-lint-ci:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Use PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.3

      - name: Install dependencies
        run: pnpm install

      - name: Initialise Terraform
        run: terraform init -backend=false

      - name: Run linting checks
        run: pnpm run lint

  terraform-plan-ci:
    permissions:
      checks: write
      contents: read
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.14.3

      - name: Run the plan
        uses: op5dev/tf-via-pr@39ed2635c056ca408ed24cc5c2baf0ef4381a7a5 # v13.7.4
        id: plan-output
        with:
          command: plan
          plan-encrypt: ${{ secrets.PASSPHRASE }}
          comment-pr: never
          expand-diff: true
          expand-summary: true
          arg-lock-timeout: 30m
        env:
          TF_CLOUD_ORGANIZATION: "alextheman"
          TF_TOKEN_app_terraform_io: "${{ secrets.TFE_TOKEN }}"
          TF_WORKSPACE: "infrastructure"

      - name: Extract run ID
        id: get-run-id
        env:
          COMMENT_BODY: ${{ steps.plan-output.outputs.comment-body }}
        run: |
          RUN_ID=$(echo "$COMMENT_BODY" | grep -oE 'https://app\.terraform\.io/app/[^/]+/[^/]+/runs/(run-[a-zA-Z0-9]+)' | sed 's#.*/##')
          echo "run-id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Get plan run details
        uses: hashicorp/tfc-workflows-github/actions/show-run@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        id: run-details
        with:
          token: ${{ secrets.TFE_TOKEN }}
          run: ${{ steps.get-run-id.outputs.run-id }}

      - name: Discard the plan run if needed
        if: fromJSON(steps.run-details.outputs.payload).data.attributes.actions.IsConfirmable
        uses: hashicorp/tfc-workflows-github/actions/discard-run@8e08d1ba957673f5fbf971a22b3219639dc45661 # v1.3.2
        with:
          token: ${{ secrets.TFE_TOKEN }}
          run: ${{ steps.run-details.outputs.run_id }}
          comment: "Discarded from GitHub Actions CI"

      - name: Save plan output
        env:
          COMMENT_BODY: ${{ steps.plan-output.outputs.comment-body }}
        run: echo "$COMMENT_BODY" > plan.txt

      - name: Upload the plan to be used in pull request comment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-plan
          path: plan.txt

  comment-terraform-plan:
    needs: [terraform-plan-ci]
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      actions: read
      checks: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Download the plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-plan

      - name: Save the plan to the GitHub Output
        id: get-plan
        run: |
          PLAN=$(cat plan.txt)
          echo "comment-body<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Get alex-up-bot GitHub token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ALEX_UP_BOT_APP_ID }}
          private-key: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
          permission-contents: read
          permission-pull-requests: write

      - name: Find existing comment
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "alex-up-bot[bot]"
          body-includes: # HCP Terraform Plan Output

      - name: Comment the plan on the pull request
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        id: create-comment
        with:
          token: ${{ steps.app-token.outputs.token }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            # HCP Terraform Plan Output

            ${{ steps.get-plan.outputs.comment-body }}

      - name: Give a 30-second plan review window before passing
        run: sleep 30

  actions-ci:
    permissions:
      contents: read
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@b392a15552197a9ee42f5927ecf5b61852152c72 # v11.2.5
