name: Apply Terraform Configuration

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_CLOUD_ORGANIZATION: "alextheman"
  TF_TOKEN_app_terraform_io: ${{ secrets.TFE_TOKEN }}
  TF_WORKSPACE: "infrastructure"

jobs:
  prepare-plan:
    if: ${{ github.repository == 'alextheman231/infrastructure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_apply: ${{ steps.verify_plan.outputs.should_apply }}
    steps:
      - name: Do not allow anyone other than AlexMan123456 to directly apply manually
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [[ "$GITHUB_ACTOR" !=  "AlexMan123456" ]]; then
            echo "Only AlexMan123456 is allowed to manually apply the configuration."
            exit 1
          fi

      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15

      - name: Initialise Terraform
        run: terraform init

      - name: Run the plan
        id: plan
        run: terraform plan -detailed-exitcode -out=tfplan
        continue-on-error: true

      - name: Verify the plan
        id: verify_plan
        env:
          PLAN_EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
        run: |
          case "$PLAN_EXIT_CODE" in
            "1")
              exit 1
              ;;
            "2")
              echo "should_apply=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
            *)
              echo "should_apply=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

      - name: Upload the plan to be applied
        if: ${{ steps.verify_plan.outputs.should_apply == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-plan
          path: tfplan

  apply:
    if: ${{ needs.prepare-plan.outputs.should_apply == 'true' }}
    needs: [prepare-plan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download the plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-plan

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15

      - name: Approve and apply the configuration
        run: terraform apply tfplan
