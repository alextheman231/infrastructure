name: Change request

on:
  workflow_dispatch:
    inputs:
      reason:
        description: A short explanation for the reason behind the change.
        required: true
      description:
        description: A further description of the change.
        required: false
        default: Reapply the configuration

jobs:
  create-change-request:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install alex-c-line
        uses: alextheman231/typescript-actions/actions/safe-npm-dependency-global-install@8701899e25ea05979ebb0c89da71c4ebd6c3911d # v1.2.3
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
          strict-version-resolution: false

      - name: Get project name
        id: project_name
        run: |
          PROJECT_NAME=$(jq -r ".name" package.json)
          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: Create the change request
        id: change_request
        env:
          PROJECT_NAME: ${{ steps.project_name.outputs.name }}
          REASON: ${{ inputs.reason }}
          DESCRIPTION: ${{ inputs.description }}
        run: |
          CHANGE_REQUEST_PATH=$(alex-c-line template change-request --project-name "$PROJECT_NAME" --reason "$REASON" --description "$DESCRIPTION" --requested-by "$GITHUB_ACTOR")
          echo "path=$CHANGE_REQUEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Get alex-up-bot GitHub token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ALEX_UP_BOT_APP_ID }}
          private-key: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          author: alex-up-bot <alexupbot@bot.com>
          committer: alex-up-bot <alexupbot@bot.com>
          branch: alex-up-bot/change-request
          base: main
          title: ${{ inputs.reason }}
          body-path: ${{ steps.change_request.outputs.path }}
