name: Scheduled Apply

on:
  schedule:
    - cron: 0 21 1 * *

jobs:
  scheduled-apply:
    permissions:
      contents: write
      pull-requests: write
    if: ${{ github.repository == 'alextheman231/infrastructure' }}
    uses: alextheman231/github-actions/.github/workflows/create-change-request.yml@9f2644441ec84b8bbaf71a57e3eb4cfe8c0be8cc # v12.2.0
    with:
      actor: alex-up-bot[bot]
      reason: "Scheduled apply"
      description: "This is a monthly scheduled apply of the Terraform configuration, intended to fix potential state drifts. Please review the plan carefully before merging."
      branch_name: scheduled-apply
